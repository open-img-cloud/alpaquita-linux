name: Watch upstream

on:
  schedule:
    - cron: '17 6 * * *'   # daily 06:17 UTC, ~7-8am Europe/Zurich
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  watch:
    uses: open-img-cloud/.github/.github/workflows/upstream-watch.yml@main
    with:
      os_name: alpaquita-linux
