name: build_image
env:
  version: ${{github.ref_name}}
  OS_URL: https://packages.bell-sw.com/alpaquita/glibc/stream/releases/x86_64/alpaquita-stream-latest-glibc-x86_64.qcow2.xz
  COMPRESS_BASE_IMAGE: alpaquita-stream-latest-glibc-x86_64.qcow2.xz
  BASE_OS_IMAGE: alpaquita-stream-latest-glibc-x86_64.qcow2

# Ajouter cette section de permissions
permissions:
  contents: write # Donne les droits d'écriture sur le contenu du dépôt

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build:
    runs-on: [self-hosted, Linux, kvm]
    container:
      image: ghcr.io/net-architect-cloud/docker-libguestfs-tools:latest
      options: --device=/dev/kvm --volume /tmp:/shared
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download base image
        run: |
          wget "$OS_URL" -O $COMPRESS_BASE_IMAGE
          xz -d $COMPRESS_BASE_IMAGE
          
      - name: Modify base OS image
        run: |
          virt-customize -a $BASE_OS_IMAGE \
            --run-command 'apk update' \
            --run-command 'apk upgrade' \
            --run-command 'apk add cloud-init py3-netiface util-linux e2fsprogs-extra qemu-guest-agent' \
            --run-command 'setup-cloud-init'
            # --copy-in config/cloud.cfg:/etc/cloud/
 
      - name: Sysprep & Sparsify image
        run: |
            virt-sysprep -a $BASE_OS_IMAGE
            virt-sparsify --convert qcow2 --compress $BASE_OS_IMAGE alpaquita-${{ env.version }}-glibc-x86_64.qcow2
            md5sum alpaquita-${{ env.version }}-glibc-x86_64.qcow2 > md5.txt
            sha1sum -b alpaquita-${{ env.version }}-glibc-x86_64.qcow2 > sha1.txt
            sha256sum -b alpaquita-${{ env.version }}-glibc-x86_64.qcow2 > sha256.txt
            cp alpaquita-${{ env.version }}-glibc-x86_64.qcow2 /shared
            cp md5.txt sha1.txt sha256.txt /shared
            
      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          name: Alpaquita Linux ${{ env.version }}
          tag_name: ${{ env.version }}
          draft: false
          prerelease: false
          files: |
            alpaquita-${{ env.version }}-glibc-x86_64.qcow2
            md5.txt
            sha1.txt
            sha256.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
