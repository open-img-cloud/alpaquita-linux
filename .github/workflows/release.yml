name: Build & publish image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Override version (otherwise derived from tag, falling back to VERSION file)'
        required: false
      publish:
        description: 'If false, skip upload + CF purge (PR / dry-run validation)'
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write   # cosign keyless via GitHub OIDC

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - id: v
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ inputs.version }}" ]]; then
            v="${{ inputs.version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            v="${GITHUB_REF#refs/tags/v}"
          elif [[ -f VERSION ]]; then
            v=$(tr -d '[:space:]' < VERSION)
          else
            echo "::error::no version provided and no VERSION file found"
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $v"

  build:
    needs: resolve-version
    name: Build ${{ matrix.libc }}
    strategy:
      fail-fast: false
      matrix:
        libc: [glibc, musl]
    uses: open-img-cloud/.github/.github/workflows/build-libguestfs-image.yml@main
    with:
      os_name: alpaquita-linux
      version: ${{ needs.resolve-version.outputs.version }}
      variant: ${{ matrix.libc }}   # avoids MANIFEST.json/SHA256SUMS collision between glibc and musl jobs
      output_filename: 'alpaquita-{version}-${{ matrix.libc }}-x86_64.qcow2'
      upstream_url: 'https://packages.bell-sw.com/alpaquita/${{ matrix.libc }}/stream/releases/x86_64/alpaquita-stream-latest-${{ matrix.libc }}-x86_64.qcow2.xz'
      decompress: xz
      customize_script: build/customize.sh
      run_sysprep: true
      sparsify_compress: true
      runtime_smoke_login_user: alpaquita
      publish: ${{ inputs.publish == true || github.event_name == 'push' }}
      sync_latest: true
    secrets: inherit
